name: Secure Server-Side Deploy

on:
  push:
    branches: [ "main" ]
  permissions:
    contents: write

jobs:
  deploy:
    ...

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Files to Arch Linux VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Target only the code and docker configs
          source: "**"
          target: "~/bevilacqua/"

      - name: Build and Run Container via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/bevilacqua
            # Build the Alpine container directly on Arch Linux
            docker compose up -d --build
            # Delete old image layers to keep your storage clean
            docker system prune -f

