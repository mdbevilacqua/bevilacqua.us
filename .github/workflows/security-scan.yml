name: Security Scan WWW

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 4 * * 1'   # Weekly on Monday at 4 AM UTC

jobs:
  security:
    runs-on: alpine:latest
    permissions:
      contents: read
      security-events: write   # Required to upload results to GitHub Security tab

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'   # Adjust if you use a different version

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install bandit safety

      # ================== Bandit SAST (Code Security) ==================
      - name: Run Bandit Security Scan
        run: |
          bandit -r . \
            --exclude venv,env,__pycache__,.git \
            -f sarif \
            -o bandit-results.sarif \
            --severity-level high \
            || true   # Change to false if you want the build to fail on findings

      - name: Upload Bandit Results to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "bandit-results.sarif"
          target: "/home/centreon/reports"

      # ================== Dependency Vulnerability Scan ==================
      - name: Check dependencies with Safety
        run: |
          safety check --file requirements.txt --output safety-results.json || true

      # ================== Optional: CodeQL (Deeper Analysis) ==================
